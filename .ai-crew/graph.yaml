nodes:
  # ── Level 0: 레이아웃 + 페이지 정리 (2 병렬, opus) ──
  - id: layout-overhaul
    type: worker
    agent: frontend-dev
    skills:
      - frontend-react
      - clean-code
    hooks: []
    depends_on: []
    config:
      isolation: worktree
      model: claude-opus-4-6

  - id: page-cleanup
    type: worker
    agent: frontend-dev
    skills:
      - frontend-react
      - clean-code
    hooks: []
    depends_on: []
    config:
      isolation: worktree
      model: claude-opus-4-6

  # ── Level 1: 3개 페이지 구현 (3 병렬, opus) ──
  - id: timeline-page
    type: worker
    agent: frontend-dev
    skills:
      - frontend-react
      - testing
      - clean-code
    hooks: []
    depends_on:
      - layout-overhaul
      - page-cleanup
    config:
      isolation: worktree
      model: claude-opus-4-6

  - id: run-detail-page
    type: worker
    agent: frontend-dev
    skills:
      - frontend-react
      - testing
      - clean-code
    hooks: []
    depends_on:
      - layout-overhaul
      - page-cleanup
    config:
      isolation: worktree
      model: claude-opus-4-6

  - id: docs-page
    type: worker
    agent: frontend-dev
    skills:
      - frontend-react
      - testing
      - clean-code
    hooks: []
    depends_on:
      - layout-overhaul
    config:
      isolation: worktree
      model: claude-opus-4-6

  # ── Level 2: 1차 테스트 (codex) ──
  - id: test-r1
    type: aggregator
    agent: tester
    skills:
      - testing
      - clean-code
    hooks: []
    depends_on:
      - timeline-page
      - run-detail-page
      - docs-page
    config:
      isolation: worktree
      model: codex
      wait: all

  # ── Level 3: 1차 코드리뷰 (codex) ──
  - id: review-r1
    type: aggregator
    agent: reviewer
    skills:
      - code-review
      - clean-code
    hooks: []
    depends_on:
      - test-r1
    config:
      isolation: worktree
      model: codex
      wait: all

  # ── Level 4: 1차 개선 (opus) ──
  - id: improve-r1
    type: worker
    agent: frontend-dev
    skills:
      - frontend-react
      - testing
      - clean-code
    hooks: []
    depends_on:
      - review-r1
    config:
      isolation: worktree
      model: claude-opus-4-6

  # ── Level 5: 2차 테스트 (codex) ──
  - id: test-r2
    type: aggregator
    agent: tester
    skills:
      - testing
      - clean-code
    hooks: []
    depends_on:
      - improve-r1
    config:
      isolation: worktree
      model: codex
      wait: all

  # ── Level 6: 2차 코드리뷰 (codex) ──
  - id: review-r2
    type: aggregator
    agent: reviewer
    skills:
      - code-review
      - clean-code
    hooks: []
    depends_on:
      - test-r2
    config:
      isolation: worktree
      model: codex
      wait: all

  # ── Level 7: 최종 개선 (opus) ──
  - id: improve-r2
    type: worker
    agent: frontend-dev
    skills:
      - frontend-react
      - testing
      - clean-code
    hooks: []
    depends_on:
      - review-r2
    config:
      isolation: worktree
      model: claude-opus-4-6

  # ── Level 8: 빌드 검증 + QA (2 병렬, codex) ──
  - id: build-verify
    type: worker
    agent: builder
    skills:
      - testing
      - clean-code
    hooks: []
    depends_on:
      - improve-r2
    config:
      isolation: worktree
      model: codex

  - id: qa-final
    type: aggregator
    agent: qa-engineer
    skills:
      - testing
      - clean-code
    hooks: []
    depends_on:
      - improve-r2
    config:
      isolation: worktree
      model: codex
      wait: all
